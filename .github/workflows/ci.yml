name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-and-build:
    name: Unit tests and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

      - name: Build
        run: npm run build

  postgres-smoke:
    name: Postgres migration smoke
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quiniela_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quiniela_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/quiniela_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run migration smoke test
        run: psql "$DATABASE_URL" -f tests/sql/smoke_0029_bracket_engine.sql
